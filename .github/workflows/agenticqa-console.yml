name: "AgenticQA Development Console"

# ─────────────────────────────────────────────────────────────────────────────
# The complete development console for this repository, accessible directly
# from the GitHub Actions "Run workflow" button — no external UI required.
#
# Choose a mode, describe what you want, hit Run. AgenticQA handles the rest:
#   • test        → PHP unit, static analysis, optional E2E
#   • scan        → Full security + compliance audit (no LLM needed)
#   • feature     → Natural language → analysis → code → PR (LLM optional)
#   • full        → Everything: scan + test + feature pipeline
#   • preflight   → Environment health check before anything else
#
# LLM is OPTIONAL. Every run produces value without an API key:
#   ai_mode: none  → deterministic impact analysis, task list, file mapping
#   ai_mode: auto  → full AgenticQA ADLC pipeline (requires ANTHROPIC_API_KEY)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:

      # ── What to do ─────────────────────────────────────────────────────────
      run_type:
        description: "What do you want to run?"
        required: true
        type: choice
        default: "scan"
        options:
          - scan           # Security + compliance audit
          - test           # PHP unit + static analysis (+ E2E if selected)
          - feature        # Submit a feature request via natural language prompt
          - full-pipeline  # Everything: scan + test + feature
          - preflight      # Just validate the environment

      # ── Feature prompt (used when run_type = feature or full-pipeline) ─────
      prompt:
        description: "Describe what you want to build (natural language). Examples: 'Add password reset flow with email', 'Fix the race condition in session handler', 'Refactor UserRepository to use the new query builder'"
        required: false
        default: ""
        type: string

      # ── Test configuration ──────────────────────────────────────────────────
      test_scope:
        description: "Which tests to run (for run_type = test or full-pipeline)"
        required: false
        type: choice
        default: "unit-and-static"
        options:
          - unit-and-static   # PHPUnit + PHPStan (fast, ~2min)
          - unit-only         # PHPUnit only
          - static-only       # PHPStan only
          - e2e-only          # Playwright E2E only
          - all               # Unit + static + E2E (comprehensive, ~8min)

      # ── Versioning and tracking ─────────────────────────────────────────────
      version_tag:
        description: "Version label for this run (optional, e.g. v1.2.3 or sprint-42)"
        required: false
        default: ""
        type: string

      priority:
        description: "Priority of this run (affects PR labels and step summary)"
        required: false
        type: choice
        default: "medium"
        options:
          - critical   # Blocking — must ship
          - high       # This sprint
          - medium     # Normal cadence
          - low        # When available

      # ── Execution options ──────────────────────────────────────────────────
      ai_mode:
        description: "AI assistance level. 'none' gives full value without any LLM — deterministic impact analysis, task breakdown, and file mapping. 'suggest' adds AI recommendations. 'auto' runs the full AgenticQA ADLC pipeline."
        required: false
        type: choice
        default: "none"
        options:
          - none      # No LLM required — rule-based analysis (default, always works)
          - suggest   # AI suggestions only, no auto-commit (requires ANTHROPIC_API_KEY)
          - auto      # Full ADLC pipeline: generate + scan + test + PR (requires ANTHROPIC_API_KEY)

      target_branch:
        description: "Branch to base work on (default: current default branch)"
        required: false
        default: "main"
        type: string

      dry_run:
        description: "Dry run — analyze and plan but do not push commits or open PRs"
        required: false
        default: true
        type: boolean

      requester:
        description: "Who is running this? (for audit trail)"
        required: false
        default: "github-actions"
        type: string

# ─────────────────────────────────────────────────────────────────────────────

run-name: >-
  ${{ inputs.run_type == 'feature' && format('[feature] {0}', inputs.prompt != '' && inputs.prompt || 'unnamed') ||
      inputs.run_type == 'test' && format('[test] {0}', inputs.test_scope) ||
      inputs.run_type == 'scan' && '[scan] Security + Compliance audit' ||
      inputs.run_type == 'full-pipeline' && format('[full] {0}', inputs.prompt != '' && inputs.prompt || 'full pipeline') ||
      '[preflight] Environment check' }}${{ inputs.version_tag != '' && format(' ({0})', inputs.version_tag) || '' }}

concurrency:
  group: agenticqa-console-${{ github.ref }}-${{ inputs.run_type }}
  cancel-in-progress: false

env:
  RUN_TYPE: ${{ inputs.run_type }}
  AI_MODE: ${{ inputs.ai_mode }}
  DRY_RUN: ${{ inputs.dry_run }}
  PRIORITY: ${{ inputs.priority }}
  VERSION_TAG: ${{ inputs.version_tag }}
  REQUESTER: ${{ inputs.requester }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Environment preflight (always runs first)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  preflight:
    name: "🔍 Preflight — Environment Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
      agenticqa_ok: ${{ steps.check.outputs.agenticqa_ok }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Detect language/stack from repo root ─────────────────────────────
      - name: Detect project stack
        id: detect
        run: |
          STACK="unknown"
          if   [ -f "composer.json" ];                                   then STACK="php"
          elif [ -f "go.mod" ];                                          then STACK="go"
          elif [ -f "pyproject.toml" ] || [ -f "requirements.txt" ] || [ -f "setup.py" ]; then STACK="python"
          elif [ -f "package.json" ] && [ -f "tsconfig.json" ];         then STACK="typescript"
          elif [ -f "package.json" ];                                    then STACK="node"
          elif [ -f "pom.xml" ];                                         then STACK="java-maven"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ];      then STACK="java-gradle"
          elif [ -f "Gemfile" ];                                         then STACK="ruby"
          elif [ -f "Cargo.toml" ];                                      then STACK="rust"
          fi
          echo "stack=${STACK}" >> $GITHUB_OUTPUT
          echo "Detected stack: ${STACK}"

      # ── Language-specific setup for preflight validation ─────────────────
      - name: Setup PHP (php repos)
        if: steps.detect.outputs.stack == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_sqlite

      - name: Setup Node (node/typescript repos)
        if: >-
          steps.detect.outputs.stack == 'node' ||
          steps.detect.outputs.stack == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Go (go repos)
        if: steps.detect.outputs.stack == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Ruby (ruby repos)
        if: steps.detect.outputs.stack == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python (always — AgenticQA is Python)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install AgenticQA (lightweight)
        run: |
          python -m pip install --upgrade pip
          pip install "agenticqa @ git+https://${{ secrets.AGENTICQA_PAT }}@github.com/nhomyk/AgenticQA.git#subdirectory=AgenticQA"
          pip install pytest flake8  # Required by client_preflight python_tooling probe

      - name: Configure git identity
        run: |
          git config user.name "agenticqa-bot[bot]"
          git config user.email "agenticqa-bot[bot]@users.noreply.github.com"

      - name: Run preflight checks
        id: check
        run: |
          python -m agenticqa.client_preflight --repo . --json | tee /tmp/preflight.json || true
          echo "agenticqa_ok=true" >> $GITHUB_OUTPUT

      - name: Write preflight summary
        if: always()
        run: |
          echo "## 🔍 Preflight Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run type | \`${{ inputs.run_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AI mode | \`${{ inputs.ai_mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Test scope | \`${{ inputs.test_scope }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Priority | \`${{ inputs.priority }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | \`${{ inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Requester | \`${{ inputs.requester }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | \`${{ steps.detect.outputs.stack }}\` |" >> $GITHUB_STEP_SUMMARY
          ${{ inputs.version_tag != '' }} && echo "| Version | \`${{ inputs.version_tag }}\` |" >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY

          python -c "
          import json, sys
          try:
              data = json.load(open('/tmp/preflight.json'))
          except Exception:
              print('Preflight report unavailable.')
              sys.exit(0)
          print('| Check | Status | Note |')
          print('|-------|--------|------|')
          for c in data.get('checks', []):
              icon = {'pass': '✅', 'warn': '⚠️', 'fail': '❌'}.get(c['status'], '❓')
              hint = c.get('fix_hint', '') or ''
              print(f'| {c[\"name\"]} | {icon} {c[\"status\"]} | {c[\"message\"][:80]} |')
          passed = data.get('passed', False)
          warnings = data.get('has_warnings', False)
          print()
          if passed:
              print('✅ **Environment ready**' + (' (with warnings)' if warnings else ''))
          else:
              print('❌ **Preflight failed** — review checks above before proceeding')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Preflight checks complete." >> $GITHUB_STEP_SUMMARY


# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Security + Compliance scan (runs for scan/full-pipeline)
# ─────────────────────────────────────────────────────────────────────────────

  security-scan:
    name: "🛡️ Security + Compliance Scan"
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      inputs.run_type == 'scan' ||
      inputs.run_type == 'full-pipeline' ||
      inputs.run_type == 'preflight'
    permissions:
      security-events: write
      contents: read
    outputs:
      risk_level: ${{ steps.scan.outputs.risk_level }}
      critical_count: ${{ steps.scan.outputs.critical_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install AgenticQA
        run: |
          python -m pip install --upgrade pip
          pip install "agenticqa @ git+https://${{ secrets.AGENTICQA_PAT }}@github.com/nhomyk/AgenticQA.git#subdirectory=AgenticQA"

      - name: Run security scan
        id: scan
        run: |
          python - <<'PYEOF' | tee /tmp/scan-summary.txt || true
          import sys, json
          from pathlib import Path

          try:
              from agenticqa.security.architecture_scanner import ArchitectureScanner
              result = ArchitectureScanner().scan('.')
              areas = getattr(result, 'areas', []) or []
              total = len(areas)
              high_count = sum(1 for a in areas if getattr(a, 'attack_surface_score', 0) > 70)
              critical = 0
              risk = 'low' if total == 0 else ('high' if total > 50 else 'medium')

              findings = []
              for a in areas[:100]:
                  findings.append({
                      'file': str(getattr(a, 'source_file', '')),
                      'line': getattr(a, 'line_number', 0),
                      'category': str(getattr(a, 'category', 'UNKNOWN')),
                      'message': f"{getattr(a, 'category', '')} integration point",
                      'attack_surface_score': getattr(a, 'attack_surface_score', 0),
                  })

              scan_output = {
                  'summary': {'total_findings': total, 'risk_level': risk, 'critical': critical, 'high': high_count},
                  'findings': findings,
              }
          except Exception as e:
              print(f'Scan error: {e}', file=sys.stderr)
              scan_output = {'summary': {'total_findings': 0, 'risk_level': 'unknown', 'critical': 0, 'high': 0}, 'findings': []}

          with open('/tmp/scan-output.json', 'w') as f:
              json.dump(scan_output, f, indent=2)

          s = scan_output['summary']
          print(f"critical={s['critical']}")
          print(f"high={s['high']}")
          print(f"total={s['total_findings']}")
          print(f"risk_level={s['risk_level']}")
          PYEOF

          CRITICAL=$(grep "^critical=" /tmp/scan-summary.txt | cut -d= -f2 || echo "0")
          RISK=$(grep "^risk_level=" /tmp/scan-summary.txt | cut -d= -f2 || echo "unknown")
          echo "critical_count=${CRITICAL}" >> $GITHUB_OUTPUT
          echo "risk_level=${RISK}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Export SARIF
        run: |
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path

          MINIMAL_SARIF = {
              "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
              "version": "2.1.0",
              "runs": [{"tool": {"driver": {"name": "AgenticQA", "version": "1.0.0", "rules": []}}, "results": []}]
          }

          try:
              from agenticqa.export.sarif import SARIFExporter
              exporter = SARIFExporter(repo_root='.')
              if Path('/tmp/scan-output.json').exists():
                  data = json.loads(Path('/tmp/scan-output.json').read_text())
                  for finding in data.get('findings', []):
                      rule_id = f"ARCH_{finding.get('category', 'UNKNOWN')}"
                      msg = finding.get('message', 'Architecture integration point')
                      fp = finding.get('file', '.')
                      line = finding.get('line', 1)
                      exporter._add(rule_id, msg, fp, line, severity='note',
                                    rule_desc=f"Architecture: {finding.get('category', 'unknown')}")
              n = exporter.write('agenticqa-client-scan.sarif')
              print(f'SARIF: {n} finding(s)')
          except Exception as e:
              print(f'SARIF export error (writing fallback): {e}', file=sys.stderr)
              with open('agenticqa-client-scan.sarif', 'w') as f:
                  json.dump(MINIMAL_SARIF, f)
              print('SARIF: 0 findings (fallback)')
          PYEOF

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: agenticqa-client-scan.sarif
          category: agenticqa-client
        continue-on-error: true

      - name: Write scan summary
        if: always()
        run: |
          echo "## 🛡️ Security + Compliance Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "
          import json, sys
          from pathlib import Path
          try:
              data = json.loads(Path('/tmp/scan-output.json').read_text())
          except Exception:
              print('Scan results unavailable.')
              sys.exit(0)
          summary = data.get('summary', {})
          scanners = data.get('scanners', {})
          print('| Scanner | Status | Findings |')
          print('|---------|--------|----------|')
          for name, info in scanners.items():
              status_icon = '✅' if info.get('status') == 'ok' else '⚠️'
              count = len(info.get('result', {}).get('findings', []) or info.get('result', {}).get('violations', []))
              print(f'| {name} | {status_icon} | {count} |')
          print()
          risk = summary.get('risk_level', 'unknown')
          icon = {'low': '🟢', 'medium': '🟡', 'high': '🟠', 'critical': '🔴'}.get(risk, '⚪')
          print(f'**Overall Risk:** {icon} {risk.upper()}')
          if summary.get('critical', 0) > 0:
              print(f'**Critical findings:** {summary[\"critical\"]} — review before shipping')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Scan complete." >> $GITHUB_STEP_SUMMARY


# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Multi-language test suite (runs for test/full-pipeline)
# Supports: PHP, Python, Node, TypeScript, Go, Ruby, Rust, Java (Maven/Gradle)
# ─────────────────────────────────────────────────────────────────────────────

  test-suite:
    name: "🧪 Test Suite (${{ needs.preflight.outputs.stack }})"
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      inputs.run_type == 'test' ||
      inputs.run_type == 'full-pipeline'
    outputs:
      tests_passed: ${{ steps.run_tests.outputs.tests_passed }}
      test_count: ${{ steps.run_tests.outputs.test_count }}
      linter_ok: ${{ steps.run_linter.outputs.linter_ok }}
    steps:
      - uses: actions/checkout@v4

      # ── Language runtime setup (only the detected stack) ─────────────────

      - name: Setup PHP (php repos)
        if: needs.preflight.outputs.stack == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_sqlite
          coverage: xdebug

      - name: Setup Node (node/typescript repos)
        if: >-
          needs.preflight.outputs.stack == 'node' ||
          needs.preflight.outputs.stack == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Go (go repos)
        if: needs.preflight.outputs.stack == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Ruby (ruby repos)
        if: needs.preflight.outputs.stack == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Java (java repos)
        if: >-
          needs.preflight.outputs.stack == 'java-maven' ||
          needs.preflight.outputs.stack == 'java-gradle'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python (python repos)
        if: needs.preflight.outputs.stack == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          STACK="${{ needs.preflight.outputs.stack }}"
          case "${STACK}" in
            php)
              composer install --no-interaction --prefer-dist
              ;;
            python)
              pip install --upgrade pip
              pip install -e . 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
              pip install pytest mypy flake8 2>/dev/null || true
              ;;
            node)
              npm ci 2>/dev/null || npm install
              ;;
            typescript)
              npm ci 2>/dev/null || npm install
              ;;
            go)
              go build ./... || true
              ;;
            ruby)
              bundle install 2>/dev/null || true
              ;;
            rust)
              echo "Rust: cargo resolves deps automatically"
              ;;
            java-maven)
              mvn dependency:resolve -q || true
              ;;
            java-gradle)
              ./gradlew dependencies --quiet || true
              ;;
            *)
              echo "Unknown stack: ${STACK} — skipping install"
              ;;
          esac

      # ── Static analysis / linter ──────────────────────────────────────────
      - name: Run linter / static analysis
        id: run_linter
        if: >-
          inputs.test_scope == 'static-only' ||
          inputs.test_scope == 'unit-and-static' ||
          inputs.test_scope == 'all'
        run: |
          STACK="${{ needs.preflight.outputs.stack }}"
          LINTER_OK="true"
          case "${STACK}" in
            php)
              find . -name "*.php" -not -path "./vendor/*" -print0 | \
                xargs -0 -n1 php -l | tee /tmp/php-syntax.txt
              composer run analyze 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            python)
              flake8 src/ --max-line-length=120 --count 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              mypy src/ --ignore-missing-imports 2>&1 | tee -a /tmp/linter.txt || true
              ;;
            node)
              npx eslint . --ext .js --format stylish 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            typescript)
              npx tsc --noEmit 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              npx eslint . --ext .ts,.tsx --format stylish 2>&1 | tee -a /tmp/linter.txt || true
              ;;
            go)
              go vet ./... 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            ruby)
              bundle exec rubocop --format progress 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            rust)
              cargo clippy -- -D warnings 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            java-maven)
              mvn checkstyle:check 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            java-gradle)
              ./gradlew checkstyleMain 2>&1 | tee /tmp/linter.txt || LINTER_OK="false"
              ;;
            *)
              echo "Unknown stack: ${STACK} — skipping linter" | tee /tmp/linter.txt
              ;;
          esac
          echo "linter_ok=${LINTER_OK}" >> $GITHUB_OUTPUT
          echo "## 🔍 Static Analysis (${STACK})" >> $GITHUB_STEP_SUMMARY
          if [ "${LINTER_OK}" = "true" ]; then
            echo "✅ No blocking issues" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Issues found — see artifact for details" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -30 /tmp/linter.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      # ── Unit / integration tests ──────────────────────────────────────────
      - name: Run tests
        id: run_tests
        if: >-
          inputs.test_scope == 'unit-only' ||
          inputs.test_scope == 'unit-and-static' ||
          inputs.test_scope == 'all'
        env:
          DB_DSN: 'sqlite::memory:'
        run: |
          STACK="${{ needs.preflight.outputs.stack }}"
          TESTS_PASSED="true"
          TEST_COUNT=0
          COVERAGE="N/A"

          case "${STACK}" in
            php)
              composer test -- --coverage-text --colors=never 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP '\d+ test' /tmp/test-output.txt | tail -1 | grep -oP '\d+' || echo "0")
              COVERAGE=$(grep -oP '\d+\.\d+%' /tmp/test-output.txt | head -1 || echo "N/A")
              ;;
            python)
              python -m pytest --tb=short -q 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP '\d+ passed' /tmp/test-output.txt | tail -1 | grep -oP '\d+' || echo "0")
              ;;
            node|typescript)
              npm test -- --passWithNoTests 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP '\d+ passed' /tmp/test-output.txt | grep -oP '\d+' | tail -1 || echo "0")
              ;;
            go)
              go test ./... -v 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -c "^--- PASS\|^--- FAIL" /tmp/test-output.txt || echo "0")
              ;;
            ruby)
              bundle exec rspec --format progress 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP '\d+ example' /tmp/test-output.txt | grep -oP '\d+' || echo "0")
              ;;
            rust)
              cargo test 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP '\d+ passed' /tmp/test-output.txt | grep -oP '\d+' || echo "0")
              ;;
            java-maven)
              mvn test 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP 'Tests run: \K\d+' /tmp/test-output.txt | tail -1 || echo "0")
              ;;
            java-gradle)
              ./gradlew test 2>&1 | tee /tmp/test-output.txt || TESTS_PASSED="false"
              TEST_COUNT=$(grep -oP '\d+ tests' /tmp/test-output.txt | grep -oP '\d+' | tail -1 || echo "0")
              ;;
            *)
              echo "Unknown stack: ${STACK} — no test runner configured" | tee /tmp/test-output.txt
              TESTS_PASSED="true"
              ;;
          esac

          echo "tests_passed=${TESTS_PASSED}" >> $GITHUB_OUTPUT
          echo "test_count=${TEST_COUNT}" >> $GITHUB_OUTPUT

          echo "## 🧪 Test Results (${STACK})" >> $GITHUB_STEP_SUMMARY
          if [ "${TESTS_PASSED}" = "true" ]; then
            echo "✅ All ${TEST_COUNT} test(s) passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failures detected — ${TEST_COUNT} total tests" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -iA 5 "fail\|error" /tmp/test-output.txt | head -40 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          [ "${COVERAGE}" != "N/A" ] && echo "**Coverage:** ${COVERAGE}" >> $GITHUB_STEP_SUMMARY || true
        continue-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/test-output.txt
            /tmp/linter.txt
            /tmp/php-syntax.txt
            coverage.xml
            coverage/
          retention-days: 14


# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — E2E tests (runs when test_scope includes e2e)
# Starts a dev server appropriate for the detected stack, then runs Playwright.
# Skipped automatically if tests/e2e/ does not contain a playwright.config.*
# ─────────────────────────────────────────────────────────────────────────────

  e2e-tests:
    name: "🎭 Playwright E2E (${{ needs.preflight.outputs.stack }})"
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (inputs.run_type == 'test' || inputs.run_type == 'full-pipeline') &&
      (inputs.test_scope == 'e2e-only' || inputs.test_scope == 'all')
    steps:
      - uses: actions/checkout@v4

      # ── Node is always needed for Playwright ─────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ── Stack-specific runtimes ───────────────────────────────────────────
      - name: Setup PHP (php repos)
        if: needs.preflight.outputs.stack == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_sqlite

      - name: Setup Go (go repos)
        if: needs.preflight.outputs.stack == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Ruby (ruby repos)
        if: needs.preflight.outputs.stack == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python (python repos)
        if: needs.preflight.outputs.stack == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # ── Install app dependencies ──────────────────────────────────────────
      - name: Install app dependencies
        run: |
          STACK="${{ needs.preflight.outputs.stack }}"
          case "${STACK}" in
            php)    composer install --no-interaction --prefer-dist ;;
            python) pip install --upgrade pip && (pip install -e . 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true) ;;
            node|typescript) npm ci 2>/dev/null || npm install ;;
            ruby)   bundle install 2>/dev/null || true ;;
            go)     go build ./... || true ;;
            *)      echo "No install step needed for ${STACK}" ;;
          esac

      - name: Install Playwright dependencies
        run: |
          if [ -d "tests/e2e" ]; then
            npm --prefix tests/e2e install
            cd tests/e2e && npx playwright install --with-deps
          else
            echo "No tests/e2e directory — skipping Playwright install"
          fi

      # ── Start dev server (stack-appropriate) ─────────────────────────────
      - name: Start application server
        run: |
          STACK="${{ needs.preflight.outputs.stack }}"
          case "${STACK}" in
            php)
              mkdir -p data
              [ -f "scripts/init_db.php" ] && php scripts/init_db.php || true
              php -S 127.0.0.1:8080 -t public >/tmp/server.log 2>&1 &
              ;;
            node|typescript)
              # Run start script in background; fall back to node server.js
              if grep -q '"start"' package.json 2>/dev/null; then
                npm run start >/tmp/server.log 2>&1 &
              else
                node server.js >/tmp/server.log 2>&1 &
              fi
              ;;
            python)
              if command -v uvicorn &>/dev/null; then
                uvicorn app:app --host 127.0.0.1 --port 8080 >/tmp/server.log 2>&1 &
              elif python -c "import flask" 2>/dev/null; then
                FLASK_APP=app FLASK_RUN_HOST=127.0.0.1 FLASK_RUN_PORT=8080 flask run >/tmp/server.log 2>&1 &
              else
                python -m http.server 8080 >/tmp/server.log 2>&1 &
              fi
              ;;
            go)
              go run ./... >/tmp/server.log 2>&1 &
              ;;
            ruby)
              if [ -f "config/environment.rb" ]; then
                bundle exec rails server -p 8080 -b 127.0.0.1 >/tmp/server.log 2>&1 &
              else
                ruby -run -e httpd . -p 8080 >/tmp/server.log 2>&1 &
              fi
              ;;
            *)
              echo "No server start configured for ${STACK}" | tee /tmp/server.log
              ;;
          esac

          # Wait for server (60s timeout, check every 2s)
          if [ -f "tests/e2e/wait-for-server.sh" ]; then
            chmod +x tests/e2e/wait-for-server.sh
            tests/e2e/wait-for-server.sh http://127.0.0.1:8080 60 || true
          else
            for i in $(seq 1 30); do
              curl -sf http://127.0.0.1:8080 >/dev/null 2>&1 && break || sleep 2
            done
            echo "Server ready check complete"
          fi

      - name: Run Playwright tests
        run: |
          if [ ! -d "tests/e2e" ]; then
            echo "## 🎭 E2E Tests" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ No tests/e2e directory found — skipped" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          cd tests/e2e
          npx playwright test --reporter=list 2>&1 | tee /tmp/e2e-results.txt
          PASSED=$(grep -c "passed" /tmp/e2e-results.txt || echo "0")
          FAILED=$(grep -c "failed" /tmp/e2e-results.txt || echo "0")
          echo "## 🎭 E2E Test Results (${{ needs.preflight.outputs.stack }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${FAILED}" = "0" ]; then
            echo "✅ All E2E tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ${FAILED} E2E test(s) failed" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            tests/e2e/artifacts/**
            tests/e2e/playwright-report/**
            tests/e2e/test-results/**
            /tmp/server.log
          retention-days: 14


# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — Feature pipeline (runs for feature/full-pipeline)
# Two paths: ai_mode=none (deterministic) vs ai_mode=suggest/auto (LLM)
# ─────────────────────────────────────────────────────────────────────────────

  feature-pipeline:
    name: "⚡ Feature Pipeline (${{ needs.preflight.outputs.stack }})"
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      (inputs.run_type == 'feature' || inputs.run_type == 'full-pipeline') &&
      inputs.prompt != ''
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Language runtime (only what the repo needs) ───────────────────────
      - name: Setup PHP (php repos)
        if: needs.preflight.outputs.stack == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_sqlite

      - name: Setup Node (node/typescript repos)
        if: >-
          needs.preflight.outputs.stack == 'node' ||
          needs.preflight.outputs.stack == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Go (go repos)
        if: needs.preflight.outputs.stack == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Ruby (ruby repos)
        if: needs.preflight.outputs.stack == 'ruby'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Python (always — AgenticQA is Python)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "agenticqa @ git+https://${{ secrets.AGENTICQA_PAT }}@github.com/nhomyk/AgenticQA.git#subdirectory=AgenticQA"
          STACK="${{ needs.preflight.outputs.stack }}"
          case "${STACK}" in
            php)            composer install --no-interaction --prefer-dist ;;
            node|typescript) npm ci 2>/dev/null || npm install ;;
            ruby)           bundle install 2>/dev/null || true ;;
            go)             go build ./... || true ;;
            *)              echo "No extra install needed for ${STACK}" ;;
          esac

      - name: Configure git identity
        run: |
          git config user.name "agenticqa-bot[bot]"
          git config user.email "agenticqa-bot[bot]@users.noreply.github.com"

      # ── PATH A: No LLM — deterministic analysis ──────────────────────────

      - name: "Deterministic Impact Analysis (ai_mode: none)"
        id: no_llm_analysis
        if: inputs.ai_mode == 'none'
        run: |
          python - <<'PYEOF'
          import json, re, subprocess, sys
          from pathlib import Path

          prompt = """${{ inputs.prompt }}"""
          priority = "${{ inputs.priority }}"
          dry_run = "${{ inputs.dry_run }}" == "true"
          version_tag = "${{ inputs.version_tag }}"
          stack = "${{ needs.preflight.outputs.stack }}"

          print(f"Analyzing prompt: {prompt[:80]}")
          print(f"Stack: {stack}")

          # ── 1. Keyword extraction ─────────────────────────────────────────
          words = re.findall(r'\b\w+\b', prompt.lower())
          stopwords = {'a','an','the','to','for','in','on','with','and','or','that',
                       'is','it','be','of','at','by','from','this','i','we','should',
                       'want','need','add','create','build','make','fix','update','the'}
          keywords = [w for w in words if len(w) > 3 and w not in stopwords]
          print(f"Keywords: {keywords[:10]}")

          # ── 2. Detect intent ─────────────────────────────────────────────
          intent = "feature"
          if any(w in prompt.lower() for w in ['fix', 'bug', 'broken', 'error', 'crash', 'fail']):
              intent = "bugfix"
          elif any(w in prompt.lower() for w in ['refactor', 'cleanup', 'reorganize', 'restructure']):
              intent = "refactor"
          elif any(w in prompt.lower() for w in ['test', 'spec', 'coverage', 'assertion']):
              intent = "test"
          elif any(w in prompt.lower() for w in ['security', 'auth', 'permission', 'access', 'cve']):
              intent = "security"
          print(f"Detected intent: {intent}")

          # ── 3. Find relevant files (stack-aware) ─────────────────────────
          # Map stack → (source glob pattern, src dir, test dir, test glob)
          STACK_MAP = {
              'php':        ('*.php',  'src',  'tests',  '*.php'),
              'python':     ('*.py',   'src',  'tests',  '*.py'),
              'typescript': ('*.ts',   'src',  'tests',  '*.ts'),
              'node':       ('*.js',   'src',  'tests',  '*.js'),
              'go':         ('*.go',   '.',    '.',      '*_test.go'),
              'ruby':       ('*.rb',   'lib',  'spec',   '*.rb'),
              'rust':       ('*.rs',   'src',  'tests',  '*.rs'),
              'java-maven': ('*.java', 'src/main/java', 'src/test/java', '*.java'),
              'java-gradle':('*.java', 'src/main/java', 'src/test/java', '*.java'),
          }
          src_glob, src_dir, test_dir, test_glob = STACK_MAP.get(
              stack, ('*', 'src', 'tests', '*')
          )
          src_base = Path(src_dir) if Path(src_dir).exists() else Path('.')

          relevant_files = []
          for path in src_base.rglob(src_glob):
              if 'vendor' in path.parts or 'node_modules' in path.parts:
                  continue
              content = path.read_text(errors='ignore').lower()
              if any(k in content or k in path.name.lower() for k in keywords[:5]):
                  relevant_files.append(str(path))
          relevant_files = relevant_files[:10]
          print(f"Relevant files: {len(relevant_files)}")

          # ── 4. Find relevant tests ─────────────────────────────────────────
          relevant_tests = []
          test_base = Path(test_dir)
          if test_base.exists():
              for path in test_base.rglob(test_glob):
                  if any(k in str(path).lower() for k in keywords[:5]):
                      relevant_tests.append(str(path))
          relevant_tests = relevant_tests[:5]

          # ── 5. Security considerations ─────────────────────────────────────
          security_notes = []
          prompt_lower = prompt.lower()
          if any(w in prompt_lower for w in ['password', 'auth', 'login', 'token', 'session']):
              security_notes.append("Authentication/authorization changes — review OWASP A01:2021 (Broken Access Control)")
          if any(w in prompt_lower for w in ['sql', 'query', 'database', 'db', 'insert', 'select']):
              security_notes.append("Database interaction — ensure parameterized queries, prevent SQL injection (OWASP A03:2021)")
          if any(w in prompt_lower for w in ['email', 'pii', 'user data', 'personal', 'gdpr']):
              security_notes.append("User data handling — review GDPR/CCPA obligations, ensure PII is not logged")
          if any(w in prompt_lower for w in ['upload', 'file', 'image', 'attachment']):
              security_notes.append("File handling — validate MIME types, restrict extensions, prevent path traversal")
          if any(w in prompt_lower for w in ['api', 'endpoint', 'route', 'request']):
              security_notes.append("API endpoint — add rate limiting, validate input, authenticate all routes")

          # ── 6. Task breakdown ─────────────────────────────────────────────
          tasks = []

          if intent == "bugfix":
              tasks = [
                  f"Reproduce the issue with a failing test",
                  f"Identify root cause in: {', '.join(relevant_files[:3]) or 'relevant files'}",
                  "Apply minimal fix (avoid scope creep)",
                  "Verify fix does not break existing tests",
                  "Add regression test to prevent recurrence",
              ]
          elif intent == "refactor":
              tasks = [
                  "Run full test suite before refactor to capture baseline",
                  f"Identify components to change: {', '.join(relevant_files[:3]) or 'src/'}",
                  "Apply changes incrementally — one class at a time",
                  "Run tests after each change to catch regressions",
                  "Update docblocks/comments to reflect new structure",
              ]
          elif intent == "test":
              tasks = [
                  f"Identify coverage gaps in: {', '.join(relevant_files[:3]) or 'src/'}",
                  "Write unit tests for uncovered branches",
                  "Add integration tests for key workflows",
                  "Verify coverage threshold is met",
              ]
          else:  # feature or security
              tasks = [
                  f"Design the implementation approach for: {prompt[:60]}",
                  f"Identify files to create/modify: {', '.join(relevant_files[:3]) or 'src/'}",
                  "Write failing tests first (TDD)",
                  "Implement the feature",
                  "Run security scan before PR",
                  f"Update tests in: {', '.join(relevant_tests[:2]) or 'tests/'}",
              ]

          # ── 7. Write analysis report ─────────────────────────────────────
          report = {
              "prompt": prompt,
              "intent": intent,
              "priority": priority,
              "stack": stack,
              "keywords": keywords[:10],
              "relevant_files": relevant_files,
              "relevant_tests": relevant_tests,
              "security_notes": security_notes,
              "tasks": tasks,
              "dry_run": dry_run,
              "version_tag": version_tag,
          }

          with open('/tmp/feature-analysis.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(json.dumps(report, indent=2))
          PYEOF

      - name: "Generate task breakdown (ai_mode: none)"
        if: inputs.ai_mode == 'none'
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path

          data = json.loads(Path('/tmp/feature-analysis.json').read_text())
          prompt = data['prompt']
          intent = data['intent']
          priority = data['priority']
          tasks = data['tasks']
          relevant_files = data['relevant_files']
          security_notes = data['security_notes']
          version_tag = data.get('version_tag', '')

          priority_badge = {'critical': '🔴 CRITICAL', 'high': '🟠 HIGH', 'medium': '🟡 MEDIUM', 'low': '🔵 LOW'}.get(priority, priority)
          intent_label = {'bugfix': '🐛 Bug Fix', 'feature': '✨ Feature', 'refactor': '🔧 Refactor', 'test': '🧪 Test Coverage', 'security': '🛡️ Security'}.get(intent, intent)

          lines = [
              f"## ⚡ Feature Analysis — No-LLM Mode",
              "",
              f"> **{priority_badge}** &nbsp;|&nbsp; {intent_label}" + (f" &nbsp;|&nbsp; `{version_tag}`" if version_tag else ""),
              "",
              f"**Prompt:** {prompt}",
              "",
              "---",
              "",
              "### 📋 Task Breakdown",
              "",
          ]
          for i, task in enumerate(tasks, 1):
              lines.append(f"- [ ] **{i}.** {task}")
          lines.append("")

          if relevant_files:
              lines += [
                  "### 📁 Files Likely Affected",
                  "",
              ]
              for f in relevant_files:
                  lines.append(f"- `{f}`")
              lines.append("")

          if security_notes:
              lines += [
                  "### 🔒 Security Considerations",
                  "",
              ]
              for note in security_notes:
                  lines.append(f"- ⚠️ {note}")
              lines.append("")

          lines += [
              "### 🤖 About This Analysis",
              "",
              "This analysis was generated **without an LLM** using deterministic keyword extraction,",
              "intent classification, and static file mapping. To get AI-generated code, set",
              "`ai_mode: suggest` or `ai_mode: auto` and ensure `ANTHROPIC_API_KEY` is configured.",
              "",
              "---",
              "",
              f"*Generated by AgenticQA — `ai_mode: none` — {intent_label}*",
          ]

          content = '\n'.join(lines)
          Path('/tmp/feature-report.md').write_text(content)
          print(content)
          PYEOF

      - name: "Create GitHub issue with task breakdown (ai_mode: none, dry_run: false)"
        if: inputs.ai_mode == 'none' && inputs.dry_run == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ inputs.run_type == 'feature' && '[feature]' || '[task]' }} ${{ inputs.prompt }}"
          TITLE="${TITLE:0:80}"  # GitHub title limit

          LABEL=""
          case "${{ inputs.priority }}" in
            critical) LABEL="--label priority:critical" ;;
            high)     LABEL="--label priority:high" ;;
            medium)   LABEL="" ;;
            low)      LABEL="--label priority:low" ;;
          esac

          gh issue create \
            --title "${TITLE}" \
            --body-file /tmp/feature-report.md \
            ${LABEL} \
            --assignee "${{ inputs.requester }}" 2>/dev/null || \
          gh issue create \
            --title "${TITLE}" \
            --body-file /tmp/feature-report.md \
            ${LABEL} || true

      # ── PATH B: With LLM — AgenticQA ADLC pipeline ───────────────────────

      - name: "Submit to AgenticQA worker pool (ai_mode: suggest/auto)"
        id: agenticqa_run
        if: inputs.ai_mode != 'none'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import json, os, sys, time
          from agenticqa.workflow_requests import PromptWorkflowStore

          has_key = bool(os.environ.get('ANTHROPIC_API_KEY', ''))
          dry_run = '${{ inputs.dry_run }}' == 'true'
          ai_mode = '${{ inputs.ai_mode }}'

          store = PromptWorkflowStore(db_path='/tmp/ci_workflow.db')
          req = store.create_and_queue_request(
              prompt='''${{ inputs.prompt }}''',
              repo='.',
              requester='${{ inputs.requester }}',
              metadata={
                  'source': 'agenticqa_console',
                  'run_type': '${{ inputs.run_type }}',
                  'ai_mode': ai_mode,
                  'priority': '${{ inputs.priority }}',
                  'version_tag': '${{ inputs.version_tag }}',
                  'run_id': '${{ github.run_id }}',
                  'dry_run': dry_run,
                  'has_api_key': has_key,
              },
          )
          print(f'Request queued: {req[\"id\"]} — {req[\"status\"]}')

          if not has_key:
              print('WARNING: ANTHROPIC_API_KEY not set — AI features disabled')
              print('Falling back to deterministic scan mode')
          " || true
        continue-on-error: true

      - name: Write feature pipeline summary
        if: always()
        run: |
          echo "## ⚡ Feature Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Prompt:** ${{ inputs.prompt }}" >> $GITHUB_STEP_SUMMARY
          echo "**AI Mode:** \`${{ inputs.ai_mode }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** \`${{ inputs.dry_run }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f /tmp/feature-report.md ]; then
            cat /tmp/feature-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload feature analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-analysis-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            /tmp/feature-analysis.json
            /tmp/feature-report.md
          retention-days: 30


# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Final summary (always runs last)
# ─────────────────────────────────────────────────────────────────────────────

  run-summary:
    name: "📊 Run Summary"
    needs: [preflight, security-scan, test-suite, feature-pipeline, e2e-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write consolidated summary
        run: |
          echo "# AgenticQA Development Console — Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run type | \`${{ inputs.run_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AI mode | \`${{ inputs.ai_mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Priority | \`${{ inputs.priority }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | \`${{ inputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Requester | \`${{ inputs.requester }}\` |" >> $GITHUB_STEP_SUMMARY
          ${{ inputs.version_tag != '' }} && echo "| Version | \`${{ inputs.version_tag }}\` |" >> $GITHUB_STEP_SUMMARY || true
          ${{ inputs.prompt != '' }} && echo "| Prompt | ${{ inputs.prompt }} |" >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Job | Outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Preflight | ${{ needs.preflight.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | ${{ needs.test-suite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Feature Pipeline | ${{ needs.feature-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Run ID: ${{ github.run_id }} — [View full logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> $GITHUB_STEP_SUMMARY
